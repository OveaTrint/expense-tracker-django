{% extends 'expenses/base.html' %}

{% block content %}
{% if form.errors %}
<p>Your username and password were incorrect, please try again.</p>
{% endif %}

<form action="{% url 'users:login' %}" method="post">
    {% csrf_token %}
    {{ form.as_div }}
    <button class="button mt-3" type="submit">Sign In </button>
</form>
{% endblock content %}
