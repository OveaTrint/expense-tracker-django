{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{% static 'untitled.png' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'bulma.css' %}" type="text/css">
    <title>Expense Tracker</title>
</head>

<body>
    <nav class="navbar is-primary" role="navigation" aria-label="main navigation">
        <div class="navbar-brand">
            <a class="navbar-item" href="/">
                <strong>2099 Expense Tracker</strong>
            </a>
        </div>

        <div class="navbar-menu">
            <div class="navbar-start">
                <span class="navbar-item">The expense tracker of the future</span>
            </div>
            <div class="navbar-end">
                {% if user.authenticated %}
                <span class="navbar-item">Hello, {{user.username}}</span>
                {% else %}
                <a class="navbar-item" href="{% url 'users:login' %}">Sign in</a>
                <a class="navbar-item" href="{% url 'users:register' %}">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <section class="section">
        <div class="container">
            {% block content %}
            {% endblock content %}
        </div>
    </section>

</body>

</html>
